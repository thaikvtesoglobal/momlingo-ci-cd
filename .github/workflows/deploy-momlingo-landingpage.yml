# ============================================================
# Momlingo Landing Page — GitHub Actions CI/CD
#
# File này thuộc GitHub public repo (momlingo-ci-cd).
# KHÔNG commit source code momlingo-landingpage vào repo này.
#
# Trigger duy nhất: repository_dispatch từ momlingo-landingpage
# (workflow "Trigger Deploy" chạy khi push vào nhánh main).
#
# Build Docker image (multi-stage: next build --output export rồi
# copy vào nginx:alpine), push GHCR, deploy bằng docker compose
# — cùng pattern với admin/backend/game-be.
# ============================================================

name: Deploy Momlingo Landing Page

on:
  repository_dispatch:
    types: [deploy-momlingo-landingpage]

# ── Payload từ momlingo-landingpage Actions ─────────────────
# github.event.client_payload.sha   (commit vừa merge vào main)

jobs:
  build-and-deploy:
    name: "Build & Deploy"
    runs-on: ubuntu-latest
    steps:
      - name: Clone momlingo-landingpage source
        run: |
          git clone \
            "https://x-access-token:${{ secrets.MOMLINGO_SOURCE_TOKEN }}@github.com/TESOSOFTWARE/momlingo-landingpage.git" \
            source
          cd source && git checkout "${{ github.event.client_payload.sha }}"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: tesosoftware
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: source
          file: source/Dockerfile
          push: true
          tags: ghcr.io/tesosoftware/momlingo-landingpage:latest

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.MOMLINGO_LANDINGPAGE_VPS_HOST }}
          username: ${{ secrets.MOMLINGO_LANDINGPAGE_VPS_USER }}
          password: ${{ secrets.MOMLINGO_LANDINGPAGE_VPS_PASSWORD }}
          script: |
            cd momlingo/momlingo_be
            docker compose --env-file .env.dev pull momlingo-home-page
            docker compose --env-file .env.dev up -d momlingo-home-page
