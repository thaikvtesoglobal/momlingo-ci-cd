# ============================================================
# Momlingo F5-TTS Service (API) — GitHub Actions CI/CD
#
# File này thuộc GitHub public repo (momlingo-ci-cd).
# KHÔNG commit source code momlingo-f5-tts-service vào repo này.
#
# Trigger duy nhất: repository_dispatch từ momlingo-f5-tts-service
# (workflow "Trigger Deploy" chạy khi push vào nhánh dev).
#
# Chỉ có môi trường dev — không deploy prod riêng cho service này.
# Server dev đủ mạnh để phục vụ, các service khác (backend/admin)
# gọi thẳng qua tts.dev.momlingo.com kể cả khi bản thân chúng chạy
# ở môi trường prod.
# ============================================================

name: Deploy Momlingo F5-TTS Service

on:
  repository_dispatch:
    types: [deploy-momlingo-f5-tts-service]

# ── Payload từ momlingo-f5-tts-service Actions ──────────────
# github.event.client_payload.env   (dev)
# github.event.client_payload.sha   (commit vừa merge)

jobs:
  build-and-deploy:
    name: "Build & Deploy (dev)"
    runs-on: ubuntu-latest
    steps:
      - name: Clone momlingo-f5-tts-service source
        run: |
          git clone \
            "https://x-access-token:${{ secrets.MOMLINGO_SOURCE_TOKEN }}@github.com/TESOSOFTWARE/momlingo-f5-tts-service.git" \
            source
          cd source && git checkout "${{ github.event.client_payload.sha }}"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: tesosoftware
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: source
          file: source/Dockerfile
          push: true
          tags: ghcr.io/tesosoftware/momlingo-f5-tts-service-dev:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on VPS dev
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.MOMLINGO_F5TTS_VPS_HOST_DEV }}
          username: ${{ secrets.MOMLINGO_F5TTS_VPS_USER_DEV }}
          password: ${{ secrets.MOMLINGO_F5TTS_VPS_PASSWORD_DEV }}
          command_timeout: 60m
          script: |
            cd momlingo/momlingo_f5tts
            mkdir -p models/vi data

            docker compose -f docker-compose.dev.yml --env-file .env.dev pull f5-tts-service

            # VI checkpoint (~5.4GB) isn't baked into the image — download once per
            # host, straight into the bind-mounted ./models volume, using the image
            # we just pulled (it already has huggingface_hub as an f5-tts dependency).
            if [ ! -f models/vi/model_last.pt ] || [ ! -f models/vi/vocab.txt ]; then
              echo "VI checkpoint missing on this host — downloading (one-time, may take a few minutes)..."
              docker run --rm -v "$(pwd)/models:/app/models" \
                ghcr.io/tesosoftware/momlingo-f5-tts-service-dev:latest \
                python -c "
            from huggingface_hub import hf_hub_download
            import shutil
            shutil.copy(hf_hub_download('hynt/F5-TTS-Vietnamese-ViVoice', 'config.json'), '/app/models/vi/vocab.txt')
            shutil.copy(hf_hub_download('hynt/F5-TTS-Vietnamese-ViVoice', 'model_last.pt'), '/app/models/vi/model_last.pt')
            "
            fi

            docker compose -f docker-compose.dev.yml --env-file .env.dev up -d f5-tts-service
