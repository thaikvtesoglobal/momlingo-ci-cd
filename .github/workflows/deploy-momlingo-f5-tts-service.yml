# ============================================================
# Momlingo F5-TTS Service (API) — GitHub Actions CI/CD
#
# File này thuộc GitHub public repo (momlingo-ci-cd).
# KHÔNG commit source code momlingo-f5-tts-service vào repo này.
#
# Trigger duy nhất: repository_dispatch từ momlingo-f5-tts-service
# (workflow "Trigger Deploy" chạy khi push vào nhánh dev/main).
#
# Service này deploy bằng docker-compose.dev.yml / docker-compose.prod.yml
# riêng của repo (không dùng chung stack docker-compose momlingo-backend),
# nên cần một thư mục deploy riêng trên VPS + secrets VPS riêng — dù hiện
# tại có thể trỏ vào cùng VPS với backend, việc tách secrets giúp dễ dàng
# chuyển sang server khác (vd. có GPU) sau này mà không cần sửa workflow.
# ============================================================

name: Deploy Momlingo F5-TTS Service

on:
  repository_dispatch:
    types: [deploy-momlingo-f5-tts-service]

# ── Payload từ momlingo-f5-tts-service Actions ──────────────
# github.event.client_payload.env   (dev | prod)
# github.event.client_payload.sha   (commit vừa merge)

jobs:
  build-and-deploy:
    name: "Build & Deploy (${{ github.event.client_payload.env }})"
    runs-on: ubuntu-latest
    steps:
      - name: Resolve image/dockerfile theo env
        id: vars
        run: |
          ENV="${{ github.event.client_payload.env }}"
          if [ "$ENV" = "prod" ]; then
            echo "image_name=momlingo-f5-tts-service" >> $GITHUB_OUTPUT
            echo "dockerfile=Dockerfile.prod" >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.prod.yml" >> $GITHUB_OUTPUT
            echo "env_file=.env.prod" >> $GITHUB_OUTPUT
          else
            echo "image_name=momlingo-f5-tts-service-dev" >> $GITHUB_OUTPUT
            echo "dockerfile=Dockerfile" >> $GITHUB_OUTPUT
            echo "compose_file=docker-compose.dev.yml" >> $GITHUB_OUTPUT
            echo "env_file=.env.dev" >> $GITHUB_OUTPUT
          fi

      - name: Clone momlingo-f5-tts-service source
        run: |
          git clone \
            "https://x-access-token:${{ secrets.MOMLINGO_SOURCE_TOKEN }}@github.com/TESOSOFTWARE/momlingo-f5-tts-service.git" \
            source
          cd source && git checkout "${{ github.event.client_payload.sha }}"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: tesosoftware
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: source
          file: source/${{ steps.vars.outputs.dockerfile }}
          push: true
          tags: ghcr.io/tesosoftware/${{ steps.vars.outputs.image_name }}:latest

      - name: Deploy on VPS dev
        if: github.event.client_payload.env == 'dev'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.MOMLINGO_F5TTS_VPS_HOST_DEV }}
          username: ${{ secrets.MOMLINGO_F5TTS_VPS_USER_DEV }}
          password: ${{ secrets.MOMLINGO_F5TTS_VPS_PASSWORD_DEV }}
          script: |
            cd momlingo/momlingo_f5tts
            docker compose -f ${{ steps.vars.outputs.compose_file }} --env-file ${{ steps.vars.outputs.env_file }} pull f5-tts-service
            docker compose -f ${{ steps.vars.outputs.compose_file }} --env-file ${{ steps.vars.outputs.env_file }} up -d f5-tts-service

      - name: Deploy on VPS prod
        if: github.event.client_payload.env == 'prod'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.MOMLINGO_F5TTS_VPS_HOST_PROD }}
          username: ${{ secrets.MOMLINGO_F5TTS_VPS_USER_PROD }}
          key: ${{ secrets.MOMLINGO_F5TTS_VPS_SSH_KEY_PROD }}
          script: |
            cd momlingo/momlingo_f5tts
            docker compose -f ${{ steps.vars.outputs.compose_file }} --env-file ${{ steps.vars.outputs.env_file }} pull f5-tts-service
            docker compose -f ${{ steps.vars.outputs.compose_file }} --env-file ${{ steps.vars.outputs.env_file }} up -d f5-tts-service
