# ============================================================
# Momlingo Backend (API) — GitHub Actions CI/CD
#
# File này thuộc GitHub public repo (momlingo-ci-cd).
# KHÔNG commit source code momlingo-backend vào repo này.
#
# Trigger duy nhất: repository_dispatch từ momlingo-backend
# (workflow "Trigger Deploy" chạy khi push vào nhánh dev/main).
# ============================================================

name: Deploy Momlingo Backend

on:
  repository_dispatch:
    types: [deploy-momlingo-backend]

# ── Payload từ momlingo-backend Actions ─────────────────────
# github.event.client_payload.env   (dev | prod)
# github.event.client_payload.sha   (commit vừa merge)

jobs:
  build-and-deploy:
    name: "Build & Deploy (${{ github.event.client_payload.env }})"
    runs-on: ubuntu-latest
    steps:
      - name: Resolve image/dockerfile theo env
        id: vars
        run: |
          ENV="${{ github.event.client_payload.env }}"
          if [ "$ENV" = "prod" ]; then
            echo "image_name=momlingo-backend" >> $GITHUB_OUTPUT
            echo "dockerfile=Dockerfile.prod" >> $GITHUB_OUTPUT
            echo "env_file=.env.prod" >> $GITHUB_OUTPUT
          else
            echo "image_name=momlingo-backend-dev" >> $GITHUB_OUTPUT
            echo "dockerfile=Dockerfile" >> $GITHUB_OUTPUT
            echo "env_file=.env.dev" >> $GITHUB_OUTPUT
          fi

      - name: Clone momlingo-backend source
        run: |
          git clone \
            "https://x-access-token:${{ secrets.MOMLINGO_SOURCE_TOKEN }}@github.com/TESOSOFTWARE/momlingo-backend.git" \
            source
          cd source && git checkout "${{ github.event.client_payload.sha }}"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: tesosoftware
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: source
          file: source/${{ steps.vars.outputs.dockerfile }}
          push: true
          tags: ghcr.io/tesosoftware/${{ steps.vars.outputs.image_name }}:latest

      - name: Deploy on VPS dev
        if: github.event.client_payload.env == 'dev'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.MOMLINGO_BACKEND_VPS_HOST_DEV }}
          username: ${{ secrets.MOMLINGO_BACKEND_VPS_USER_DEV }}
          password: ${{ secrets.MOMLINGO_BACKEND_VPS_PASSWORD_DEV }}
          script: |
            cd momlingo/momlingo_be
            docker compose --env-file ${{ steps.vars.outputs.env_file }} pull app
            docker compose --env-file ${{ steps.vars.outputs.env_file }} up -d app

      - name: Deploy on VPS prod
        if: github.event.client_payload.env == 'prod'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.MOMLINGO_VPS_HOST_PROD }}
          username: ${{ secrets.MOMLINGO_VPS_USER_PROD }}
          key: ${{ secrets.MOMLINGO_VPS_SSH_KEY_PROD }}
          script: |
            cd momlingo/momlingo_be
            docker compose --env-file ${{ steps.vars.outputs.env_file }} pull momlingo-app
            docker compose --env-file ${{ steps.vars.outputs.env_file }} up -d momlingo-app
